<div class="flex flex-col space-y-6">
  <div>
    <span
      class="inline-flex items-center rounded-md px-2 py-1 text-xs font-medium ring-1 ring-inset ring-gray-400/20"
    >
      {{ badgeText }}
    </span>
    <h3 class="font-headline text-3xl font-bold tracking-tight mt-2 break-words">{{ titulo }}</h3>
    <p class="font-body mt-2 flex items-center gap-2 text-gray-600 break-words">
      {{ direccion }}
    </p>
  </div>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
    <div class="p-5 rounded-xl border border-gray-200 shadow-sm">
      <p class="text-xs font-semibold uppercase truncate">Técnicos</p>
      <p class="text-2xl font-bold">{{ tecnicos }}</p>
    </div>

    <div class="p-5 rounded-xl border border-gray-200 shadow-sm">
      <p class="text-xs font-semibold uppercase truncate">Vehículos</p>
      <p class="text-2xl font-bold">{{ vehiculos }}</p>
    </div>

    <div class="p-5 rounded-xl border border-gray-200 shadow-sm sm:col-span-1 col-span-2">
      <p class="text-xs font-semibold uppercase truncate">Contacto</p>
      <p class="text-md font-medium truncate">{{ contacto }}</p>
    </div>
  </div>

  <div class="mt-2">
    <app-button [url]="urlDetalle">Ver Detalles</app-button>
  </div>
</div>
