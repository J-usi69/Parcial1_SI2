<article class="bg-gray-950 text-white font-sans min-h-screen flex md:flex-row">
  <main class="flex-1 p-6 md:p-12 lg:p-24">
    <header class="mb-10 text-center">
      <h1 class="text-4xl font-bold mb-4">Agregar Sucursal</h1>
      <p class="text-gray-400">Define la ubicación de tu taller o punto de servicio principal.</p>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      <div class="lg:col-span-5 flex flex-col gap-6">
        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
          <form class="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-2"
                >Nombre de Sucursal</label
              >
              <div
                class="flex items-center bg-gray-900/50 border border-white/10 rounded-xl px-4 py-3 input-focus-ring"
              >
                <input
                  class="w-full bg-transparent border-none focus:ring-0 placeholder-gray-600"
                  placeholder="e.g. Centro Automotriz"
                  type="text"
                />
              </div>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-2"
                >Dirección</label
              >
              <textarea
                class="w-full bg-gray-900/50 border border-white/10 rounded-xl px-4 py-3 input-focus-ring h-24"
                placeholder="Dirección detallada..."
              ></textarea>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-2"
                >Especialidad</label
              >
              <select
                class="w-full bg-gray-900/50 border border-white/10 rounded-xl px-4 py-3 input-focus-ring cursor-pointer"
              >
                <option>Reparación General</option>
                <option>Transmisión</option>
                <option>Carrocería</option>
                <option>Eléctrica</option>
              </select>
            </div>
          </form>
        </div>
      </div>

      <div class="lg:col-span-7">
        <div
          class="glass-panel rounded-3xl p-4 h-full min-h-[400px] flex flex-col relative overflow-hidden"
        >
          <div class="flex justify-between items-center px-4 py-2 mb-4">
            <h3 class="font-bold">Pin de Ubicación</h3>
            <button
              class="text-xs bg-indigo-600 px-3 py-1 rounded-full hover:bg-indigo-700 transition-colors"
            >
              Usar ubicación actual
            </button>
          </div>
          <div class="flex-1 bg-gray-900 rounded-2xl flex items-center justify-center relative">
            <span class="material-symbols-outlined text-5xl text-indigo-500">location_on</span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex justify-between items-center">
      <app-button label="Atrás" url="/create-company"></app-button>
      <app-button label="Finalizar Registro" url="/site-view/admin"></app-button>
    </div>
  </main>
</article>
