<!doctype html>
<html class="dark" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Veltra - Registro (Paso 2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <style>
      .glass-panel {
        background-color: rgba(31, 41, 55, 0.4);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .input-focus-ring:focus-within {
        outline: 2px solid #6366f1;
        outline-offset: 2px;
      }
    </style>
  </head>
  <div class="flex items-center justify-between mb-10 px-4">
    <div class="flex items-center gap-2 text-indigo-500">
      <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold">
        1
      </div>
    </div>
    <div class="h-[2px] flex-1 bg-indigo-600 mx-4"></div>
    <div class="flex items-center gap-2 text-white">
      <div class="w-8 h-8 rounded-full bg-indigo-600 flex items-center justify-center font-bold">
        2
      </div>
    </div>
    <div class="h-[2px] flex-1 bg-white/10 mx-4"></div>
    <div class="flex items-center gap-2 text-gray-500">
      <div class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center font-bold">
        3
      </div>
    </div>
  </div>
  <body class="bg-gray-950 text-white font-sans min-h-screen flex md:flex-row">
    <main class="flex-1 p-6 md:p-12 lg:p-24">
      <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center">
          <h1 class="text-4xl font-bold mb-4">Crear Compañía</h1>
          <p class="text-gray-400">Define la identidad principal de tu entidad de negocio.</p>
        </header>

        <div class="glass-panel rounded-3xl p-8 shadow-2xl">
          <form class="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
              <label
                class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-2 flex justify-between"
              >
                NIT (Opcional)
              </label>
              <div
                class="flex items-center bg-gray-900/50 border border-white/10 rounded-xl px-4 py-3 input-focus-ring"
              >
                <span class="material-symbols-outlined text-gray-500 mr-3">tag</span>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 placeholder-gray-600"
                  placeholder="Ingresa el NIT"
                  type="text"
                />
              </div>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-xs font-semibold text-gray-400 uppercase tracking-widest px-2">
                Razón Social
              </label>
              <div
                class="flex items-center bg-gray-900/50 border border-white/10 rounded-xl px-4 py-3 input-focus-ring"
              >
                <span class="material-symbols-outlined text-gray-500 mr-3">domain</span>
                <input
                  class="w-full bg-transparent border-none focus:ring-0 placeholder-gray-600"
                  placeholder="Nombre oficial de la empresa"
                  required
                  type="text"
                />
              </div>
            </div>

            <div class="flex flex-col md:flex-row items-center justify-between mt-6 gap-4">
              <app-button url="/create-user"> Atrás </app-button>
              <app-button url="/create-branch"> Siguiente </app-button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </body>
</html>
