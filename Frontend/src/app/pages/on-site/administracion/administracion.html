<div
  class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-12 gap-6 relative z-10"
>
  <div>
    <h2
      class="font-headline text-[3.5rem] leading-tight font-extrabold text-on-surface tracking-[-0.02em]"
    >
      Administración de Empresa
    </h2>
    <p class="font-body text-on-surface-variant mt-2 text-lg">
      Gestión centralizada de sucursales y operaciones técnicas.
    </p>
  </div>
  <app-button url="/new-branch-form"> + Nuevo Registro </app-button>
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-8 min-w-0">
  @for (sucursal of sucursales; track sucursal.titulo) {
    <app-sucursal-card
      [badgeText]="sucursal.badgeText"
      [titulo]="sucursal.titulo"
      [direccion]="sucursal.direccion"
      [tecnicos]="sucursal.tecnicos"
      [vehiculos]="sucursal.vehiculos"
      [contacto]="sucursal.contacto"
      [urlDetalle]="sucursal.urlDetalle"
    >
    </app-sucursal-card>
  }
</div>
