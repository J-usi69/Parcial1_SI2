<div
  class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-12 gap-6 relative z-10"
>
  <div>
    <h2
      class="font-headline text-[3.5rem] leading-tight font-extrabold text-on-surface tracking-[-0.02em]"
    >
      Administración de Trabajadores
    </h2>
    <p class="font-body text-on-surface-variant mt-2 text-lg">
      Gestión centralizada de trabajadores.
    </p>
  </div>
  <app-button url="/new-user-form"> + Nuevo Trabajador</app-button>
</div>
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 p-6">
  @for (worker of listaTrabajadores; track worker.nombre) {
    <app-worker-card [data]="worker"></app-worker-card>
  }
</div>
