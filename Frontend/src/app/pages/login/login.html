<div class="flex min-h-screen flex-col justify-center px-6 py-12 lg:px-8 bg-gray-950">
  <div class="relative z-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <img
      src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=500"
      alt="Your Company"
      class="mx-auto h-10 w-auto"
    />
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">
      Ingresa a tu cuenta
    </h2>
  </div>

  <div
    class="mt-10 relative z-10 sm:mx-auto sm:w-full sm:max-w-sm glass-panel rounded-3xl p-8 shadow-2xl border border-white/10"
  >
    <div class="space-y-6">
      <div>
        <label
          for="email"
          class="block text-xs font-semibold text-gray-400 uppercase tracking-widest px-2"
          >Correo Electrónico</label
        >
        <div
          class="mt-2 w-full rounded-xl bg-gray-900/50 border border-white/10 input-focus-ring flex items-center px-4 py-3"
        >
          <input
            #email
            id="email"
            type="email"
            name="email"
            required
            autocomplete="email"
            class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-gray-500"
            placeholder="usuario@ejemplo.com"
          />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between px-2">
          <label
            for="password"
            class="block text-xs font-semibold text-gray-400 uppercase tracking-widest"
            >Contraseña</label
          >
          <div class="text-sm">
            <a href="#" class="font-semibold text-indigo-400 hover:text-indigo-300"
              >¿Olvidaste tu contraseña?</a
            >
          </div>
        </div>
        <div
          class="mt-2 w-full rounded-xl bg-gray-900/50 border border-white/10 input-focus-ring flex items-center px-4 py-3"
        >
          <input
            #password
            id="password"
            type="password"
            name="password"
            required
            autocomplete="current-password"
            class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-gray-500"
            placeholder="••••••••"
          />
        </div>
      </div>

      <div class="flex justify-center">
        <button
          type="button"
          class="rounded-2xl bg-indigo-500 px-6 py-3 text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-indigo-400 disabled:cursor-not-allowed disabled:opacity-60"
          [disabled]="isLoading"
          (click)="login(email.value, password.value)"
        >
          {{ isLoading ? 'Ingresando...' : 'Iniciar Sesión' }}
        </button>
      </div>

      <div *ngIf="errorMessage" class="text-center text-sm text-red-300">
        {{ errorMessage }}
      </div>

      <p class="mt-3 text-center text-sm/6 text-gray-400">
        ¿No tienes cuenta?
        <a routerLink="/create-user" class="font-semibold text-indigo-400 hover:text-indigo-300"
          >Registrate ahora</a
        >
      </p>
    </div>
  </div>
</div>
