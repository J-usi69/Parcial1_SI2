<div class="flex min-h-screen bg-gray-950 text-white">
  <aside class="hidden md:flex w-48 border-r border-white/10 p-6 flex-col gap-6">
    <div>
      <h2 class="text-2xl font-bold mb-2">Veltra</h2>
    </div>

    <nav class="flex flex-col gap-1.5">
      <a
        routerLink="/site-view/overview"
        routerLinkActive="bg-indigo-600 text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-gray-500 hover:bg-white/5 text-sm"
      >
        General
      </a>

      <a
        routerLink="/site-view/new-requests"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-gray-500 hover:bg-white/5 text-sm"
      >
        Solicitudes
      </a>

      <a
        routerLink="/site-view/workers"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-gray-500 hover:bg-white/5 text-sm"
      >
        Tecnicos
      </a>

      <a
        routerLink="/site-view/vehicles"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-gray-500 hover:bg-white/5 text-sm"
      >
        Vehiculos
      </a>

      <a
        routerLink="/history"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-gray-500 hover:bg-white/5 text-sm"
      >
        Historial
      </a>

      <a
        routerLink="/site-view/admin"
        routerLinkActive="bg-indigo-600 text-white"
        class="flex items-center gap-3 px-4 py-2.5 rounded-xl text-gray-500 hover:bg-white/5 text-sm"
      >
        Administracion
      </a>
    </nav>

    <div class="mt-auto pt-4 border-t border-white/10">
      <button
        (click)="logout()"
        class="w-full rounded-xl bg-red-600 px-4 py-3 text-sm font-semibold uppercase tracking-wide text-white transition hover:bg-red-500"
        type="button"
      >
        Cerrar sesión
      </button>
    </div>
  </aside>

  <main class="flex-1 p-8">
    <router-outlet></router-outlet>
  </main>
</div>
